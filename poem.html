<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reading Piece | @safespaceofyours</title>
  <meta name="description" content="Read a full spoken poetry piece from @safespaceofyours." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css?v=v20l1-home-commissions-cleanup" />
</head>
<body class="reader-body">
  <div class="bg-orbs"></div>
  <div class="paper-texture"></div>

  <header class="site-header">
    <a href="./" class="logo">@safespaceofyours</a>

        <button class="mobile-nav-toggle" type="button" data-mobile-nav-toggle aria-label="Open navigation menu" aria-expanded="false" aria-controls="siteNavLinks">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
<nav class="nav-links" id="siteNavLinks">
      <a href="pieces.html">Pieces</a>
      <a href="commissions.html">Commissions</a>
      <a href="./">Home</a>
    </nav>
  </header>

  <main class="reader-layout">
    <a href="pieces.html" class="back-link">← Back to pieces</a>

    <article id="reader" class="reader-card">
      <div class="reader-cover-wrap">
        <img id="readerCover" src="" alt="" />
      </div>

      <div class="reader-content">
        <p id="readerCategory" class="eyebrow"></p>
        <h1 id="readerTitle"></h1>
        <p id="readerExcerpt" class="reader-excerpt"></p>

        <hr />

        <div id="poemText" class="poem-text">
          Loading piece...
        </div>

        <nav id="readerActions" class="reader-actions" aria-label="Poem navigation">
          <a id="prevPoem" class="reader-action-btn" href="#">← Previous piece</a>
          <button id="randomPoem" class="reader-action-btn random-btn" type="button">Random piece ✦</button>
          <a id="nextPoem" class="reader-action-btn" href="#">Next piece →</a>
        </nav>
      </div>
    </article>
  </main>

  <footer>
    <p>© <span id="year"></span> @safespaceofyours. Written with quiet courage.</p>
  </footer>

  <button id="scrollTopBtn" class="scroll-top" type="button" aria-label="Back to top">↑</button>

  <script src="js/poems.js?v=v18r-label-controls-2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=v18r-label-controls-2"></script>
  <script src="js/piece-settings.js?v=v18r-label-controls-2"></script>
<script src="js/poem.js?v=v20k1-mobile-hamburger-nav"></script>
</body>

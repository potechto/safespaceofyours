<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Methods | @safespaceofyours</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/admin.css?v=v20q63j-paid-preview-counts-toast" />
</head>
<body class="admin-standalone-page" data-admin-page="payment-methods">
  <main class="admin-shell admin-standalone-shell">
    <nav class="admin-control-bar hidden" aria-label="Private Space controls">
      <p id="dashboardMessage" class="status-message admin-top-status" role="status"></p>

      <div class="admin-control-actions">
        <button id="promoRequestBell" class="admin-control-btn promo-request-bell icon-only" type="button" aria-label="View promo requests" title="View promo requests">
          <span class="bell-icon" aria-hidden="true">&#128276;</span>
          <strong id="promoRequestBellCount">0</strong>
          <span class="sr-only">View promo requests</span>
        </button>

        <div class="admin-menu-wrap">
          <button
            id="adminMenuToggle"
            class="admin-control-btn admin-menu-toggle"
            type="button"
            aria-label="Open admin menu"
            aria-expanded="false"
            aria-controls="adminMenuPanel"
          >
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span class="sr-only">Open admin menu</span>
          </button>

          <div id="adminMenuPanel" class="admin-menu-panel" hidden>
            <a class="admin-menu-item" href="./">Back to site</a>
            <a class="admin-menu-item" href="admin.html">Private Space</a>
            <a class="admin-menu-item" href="admin-piece-control.html">Piece control</a>
            <button id="logoutBtn" class="admin-menu-item danger" type="button">Log out</button>
          </div>
        </div>
      </div>
    </nav>

    <section id="authView" class="admin-card auth-card">
      <div class="card-heading">
        <p class="eyebrow">LogIn</p>
        <h2 id="authTitle">Sign-in</h2>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Access options">
        <button class="auth-tab active" type="button" data-auth-mode="login">Sign-in</button>
        <button class="auth-tab" type="button" data-auth-mode="signup">Sign-up</button>
      </div>

      <form id="emailForm" class="admin-form">
        <label>
          Email
          <input id="emailInput" type="email" autocomplete="off" placeholder="Enter email" required />
        </label>

        <button id="emailSubmitBtn" class="primary-btn" type="submit">
          Sign-in
        </button>
      </form>

      <form id="verifyForm" class="admin-form hidden">
        <label>
          Code
          <input id="codeInput" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="Code" required />
        </label>
      </form>

      <form id="profileForm" class="admin-form hidden" aria-hidden="true"></form>

      <p id="authMessage" class="status-message" role="status"></p>
    </section>

    <section id="dashboardView" class="admin-view hidden admin-standalone-dashboard">
      <a class="public-space-float" href="public-space.html" aria-label="Go to public space" title="Go to public space">
        <img src="Resources/ps.png" alt="" aria-hidden="true" />
        <span class="sr-only">Go to public space</span>
      </a>
      <button id="adminScrollTopBtn" class="admin-scroll-top" type="button" aria-label="Back to top" aria-hidden="true">↑</button>

      <p class="admin-standalone-note">View and update visible manual payment methods in a focused workspace.</p>
<div class="admin-grid admin-standalone-grid">
        <section class="admin-card manager-card wide-card" id="paymentMethodsCard">
          <div class="card-heading">
            <h3>Payment methods</h3>
            <p>View and update visible manual payment methods.</p>
          </div>

          <div id="paymentList" class="admin-list"></div>
        </section>
      </div>
    </section>

    <div id="promoRequestModal" class="admin-modal-overlay" aria-hidden="true">
    <div class="admin-modal-card promo-request-modal-card" role="dialog" aria-modal="true" aria-labelledby="promoRequestModalTitle">
      <button id="closePromoRequestModal" class="admin-modal-close" type="button" aria-label="Close promo requests">X</button>

      <div class="admin-modal-header">
        <div>
          <p class="eyebrow">Viewer requests</p>
          <h2 id="promoRequestModalTitle">Promo requests</h2>
          <p class="modal-help">Unread pending requests appear on the bell badge.</p>
        </div>
      </div>

      <div id="promoRequestList" class="admin-list promo-request-modal-list"></div>
    </div>
  </div>
  </main>

  <script src="js/poems.js?v=v20q63j-paid-preview-counts-toast"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=v18r-label-controls-2"></script>
  <script src="js/piece-settings.js?v=v20q60-protected-premium-reader"></script>
  <script src="js/admin-auth.js?v=v18r-label-controls-2"></script>
  <script src="js/admin-dashboard.js?v=v20q63j-paid-preview-counts-toast"></script>
</body>
</html>

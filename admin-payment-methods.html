<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Methods | @safespaceofyours</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/admin.css?v=v20q1-admin-standalone-pages" />
</head>
<body class="admin-standalone-page" data-admin-page="payment-methods">
  <main class="admin-shell admin-standalone-shell">
    <nav class="admin-control-bar hidden" aria-hidden="true">
      <div class="admin-control-inner admin-standalone-control-inner">
        <a class="admin-control-link" href="admin.html">Private Space</a>
        <a class="admin-control-link" href="./" target="_blank" rel="noopener">Back to site</a>
        <button id="logoutBtn" class="admin-control-btn" type="button">Log out</button>
      </div>
    </nav>

    <section id="authView" class="admin-card auth-card">
      <div class="card-heading">
        <p class="eyebrow">LogIn</p>
        <h2 id="authTitle">Sign-in</h2>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Access options">
        <button class="auth-tab active" type="button" data-auth-mode="login">Sign-in</button>
        <button class="auth-tab" type="button" data-auth-mode="signup">Sign-up</button>
      </div>

      <form id="emailForm" class="admin-form">
        <label>
          Email
          <input id="emailInput" type="email" autocomplete="off" placeholder="Enter email" required />
        </label>

        <button id="emailSubmitBtn" class="primary-btn" type="submit">
          Sign-in
        </button>
      </form>

      <form id="verifyForm" class="admin-form hidden">
        <label>
          Code
          <input id="codeInput" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="8" placeholder="Code" required />
        </label>
      </form>

      <form id="profileForm" class="admin-form hidden" aria-hidden="true"></form>

      <p id="authMessage" class="status-message" role="status"></p>
    </section>

    <section id="dashboardView" class="admin-view hidden admin-standalone-dashboard">
      <div class="admin-standalone-heading">
        <p class="eyebrow">Private controls</p>
        <h1>Payment methods</h1>
        <p>View and update visible manual payment methods in a focused workspace.</p>
      </div>

      <p id="dashboardMessage" class="admin-message" role="status"></p>

      <div class="admin-grid admin-standalone-grid">
        <section class="admin-card manager-card wide-card" id="paymentMethodsCard">
          <div class="card-heading">
            <h3>Payment methods</h3>
            <p>View and update visible manual payment methods.</p>
          </div>

          <div id="paymentList" class="admin-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=v18r-label-controls-2"></script>
  <script src="js/piece-settings.js?v=v18r-label-controls-2"></script>
  <script src="js/admin-auth.js?v=v18r-label-controls-2"></script>
  <script src="js/admin-dashboard.js?v=v20q1-admin-standalone-pages"></script>
</body>
</html>
